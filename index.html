<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3a2f1e">
<title>旅のアプリ</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    background:#f4efe2;color:#2b2b2b;min-height:100vh;padding:28px 18px 40px}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-size:20px;letter-spacing:.06em;margin:4px 2px 4px;font-weight:800}
  .lead{font-size:12.5px;color:#7a6f57;margin:0 2px 20px}
  a.card{display:flex;gap:14px;align-items:center;text-decoration:none;color:inherit;
    background:#fff;border:1px solid #e4ddca;border-radius:16px;padding:14px;margin-bottom:14px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);transition:transform .12s,box-shadow .12s}
  a.card:active{transform:scale(.99);box-shadow:0 1px 5px rgba(0,0,0,.08)}
  .card img{width:64px;height:64px;border-radius:14px;flex:0 0 auto;object-fit:cover}
  .card .t{min-width:0}
  .card .t b{display:block;font-size:16px;font-weight:800;margin-bottom:2px}
  .card .t span{font-size:12px;color:#7a6f57}
  .card .go{margin-left:auto;color:#bb9a66;font-size:20px;flex:0 0 auto}
  footer{font-size:10.5px;color:#a99;text-align:center;margin-top:18px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <h1>旅のアプリ</h1>
  <p class="lead">各アプリを開いて、Safariの「共有 → ホーム画面に追加」でアイコンとして置けます。</p>

  <a class="card" href="hakone/">
    <img src="hakone/icon-512.png" alt="箱根八里">
    <div class="t"><b>箱根八里 なぞり地図</b><span>小田原 → 三島 ・ 旧街道ウォーク</span></div>
    <span class="go">›</span>
  </a>

  <a class="card" href="sado/">
    <img src="sado/icon-512.png" alt="佐渡・長岡花火">
    <div class="t"><b>佐渡・長岡花火 旅のしおり</b><span>2026/7/31 → 8/4</span></div>
    <span class="go">›</span>
  </a>

  <footer>風つむぎ ／ 個人用の旅ツール<br>地図・ナビは要ネット接続。現地の道標・掲示を最優先に。</footer>
</div>
</body>
</html>
