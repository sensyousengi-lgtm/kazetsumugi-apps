<html lang="ja">
<head>

<style>
  :root{
    --sea:#0e3a4a;        /* 日本海の藍 */
    --sea2:#16566b;
    --gold:#c8902f;       /* 金山・花火 */
    --toki:#e07a64;       /* 朱鷺 */
    --paper:#f6f3ec;
    --card:#ffffff;
    --ink:#1d2a2e;
    --muted:#6b7a80;
    --line:#e4ded2;
    --ok:#1f7a5a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--paper);color:var(--ink);
    line-height:1.6;-webkit-text-size-adjust:100%;
    padding-bottom:40px;
  }
  .wrap{max-width:560px;margin:0 auto;}

  /* header */
  header{
    background:linear-gradient(160deg,var(--sea),var(--sea2));
    color:#fff;padding:18px 18px 14px;padding-top:max(18px,env(safe-area-inset-top));
  }
  header .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.8;margin:0 0 4px;}
  header h1{font-size:21px;margin:0;font-weight:800;letter-spacing:.01em;}
  header .dates{font-size:12.5px;opacity:.85;margin-top:3px;}

  /* tabs */
  .tabs{position:sticky;top:0;z-index:20;background:var(--sea);display:flex;overflow-x:auto;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-top:env(safe-area-inset-top,0);}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;padding:11px 15px;color:#cfe0e6;font-size:13px;font-weight:700;
    background:none;border:none;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;}
  .tab small{display:block;font-size:10px;font-weight:600;opacity:.75;letter-spacing:.04em;}
  .tab.active{color:#fff;border-bottom-color:var(--gold);}

  main{padding:14px 14px 0;}
  .day{display:none;}
  .day.active{display:block;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .dayhead{margin:4px 2px 12px;}
  .dayhead h2{margin:0;font-size:17px;font-weight:800;}
  .dayhead p{margin:3px 0 0;font-size:12.5px;color:var(--muted);}

  .note-flex{background:#fff7e8;border:1px solid #f0dca8;border-radius:12px;padding:10px 12px;
    font-size:12.5px;color:#7a5a17;margin:0 2px 14px;}
  .note-flex b{color:var(--gold);}

  /* timeline cards */
  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;margin:0 2px 10px;position:relative;overflow:hidden;}
  .item:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sea);}
  .item.eat:before{background:var(--toki);}
  .item.see:before{background:var(--gold);}
  .item.ferry:before{background:#2f8fb0;}
  .item.hike:before{background:#3c8a4e;}
  .item.onsen:before{background:#b5683f;}
  .item.fire:before{background:#b5384f;}
  .item.stay:before{background:#7a6cae;}
  .item .top{display:flex;align-items:baseline;gap:9px;}
  .time{font-size:13px;font-weight:800;color:var(--sea);font-variant-numeric:tabular-nums;flex:0 0 auto;min-width:44px;}
  .item.eat .time{color:var(--toki);}
  .item.see .time{color:var(--gold);}
  .item.hike .time{color:#3c8a4e;}
  .item.onsen .time{color:#b5683f;}
  .item.fire .time{color:#b5384f;}
  .ttl{font-size:14.5px;font-weight:700;}
  .cat{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;
    margin-bottom:1px;}
  .desc{font-size:12.5px;color:#4a575c;margin:5px 0 0;}
  .desc.warn{color:#9a3a2a;}
  .row{margin-top:8px;display:flex;flex-wrap:wrap;gap:7px;}
  a.pin,a.tel{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
    text-decoration:none;padding:5px 10px;border-radius:999px;border:1px solid var(--line);}
  a.pin{color:var(--sea);background:#eef5f7;border-color:#d3e6ec;}
  a.tel{color:#2c6a3f;background:#eef6ef;border-color:#cfe6d4;}
  a.pin:active,a.tel:active{transform:scale(.97);}

  .plan-label{display:flex;align-items:center;gap:8px;margin:2px 2px 8px;font-size:13px;font-weight:800;}
  .pill{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.05em;}
  .pill.hike{background:#e7f3ea;color:#2f6e40;}
  .pill.see{background:#fbf0d8;color:#8a6418;}

  /* reference */
  .ref h3,.lists h3{font-size:13px;letter-spacing:.06em;color:var(--muted);margin:18px 4px 8px;
    text-transform:uppercase;font-weight:800;}
  .ref .item{padding:11px 13px;}
  .ref .ttl{font-size:13.5px;}
  .kv{font-size:12.5px;color:#4a575c;margin-top:2px;}
  .kv b{color:var(--ink);}

  /* checklists */
  .check{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:0 2px 12px;overflow:hidden;}
  .check h4{margin:0;padding:12px 13px;font-size:14px;font-weight:800;background:#f0ece1;
    display:flex;justify-content:space-between;align-items:center;}
  .check h4 .cnt{font-size:11px;color:var(--muted);font-weight:700;}
  .check ul{list-style:none;margin:0;padding:4px 0 6px;}
  .check li{padding:0;}
  .check label{display:flex;gap:11px;align-items:flex-start;padding:8px 13px;font-size:13.5px;cursor:pointer;}
  .check input{appearance:none;-webkit-appearance:none;width:21px;height:21px;flex:0 0 auto;margin-top:1px;
    border:2px solid #c7cdc9;border-radius:6px;position:relative;background:#fff;}
  .check input:checked{background:var(--ok);border-color:var(--ok);}
  .check input:checked:after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;
    border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);}
  .check input:checked + span{color:#9aa4a0;text-decoration:line-through;}
  .reset{display:block;margin:0 2px 24px;width:calc(100% - 4px);background:none;border:1px dashed var(--line);
    color:var(--muted);font-size:12px;font-weight:700;padding:9px;border-radius:12px;font-family:inherit;}
  .reset:active{background:#efece4;}

  footer{text-align:center;font-size:11px;color:var(--muted);padding:8px 16px 24px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}
  /* 起動スプラッシュ（佐渡島ヒーロー） */
  #splash{position:fixed;inset:0;z-index:9000;background:#efe7cf url('hero.jpg') center/cover no-repeat;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:13vh;transition:opacity .6s ease}
  #splash .st{background:rgba(14,58,74,.78);color:#fff;padding:10px 20px;border-radius:12px;text-align:center}
  #splash .st b{display:block;font-size:20px;letter-spacing:.08em;font-weight:800}
  #splash .st span{font-size:12px;opacity:.9;letter-spacing:.04em}
  #splash.hide{opacity:0;pointer-events:none}
</style>
</head>

</div>
<script>

    {key:'8/1',dow:'土',title:'8/1(土)｜登山（金北山ドンデンピストン）',sub:'※天気が悪ければ8/2と入れ替え（晴れる日に登山）',block:'hike'},
    {key:'8/2',dow:'日',title:'8/2(日)｜観光（西側一筆書き）',sub:'※天気が悪ければ8/1と入れ替え',block:'see'},
    {key:'8/3',dow:'月',title:'8/3(月)｜朝便で本土→長岡花火',sub:'早めに渡る（台風欠航対策）',
     items:[
      {t:'⚠',cat:'要注意',cls:'fire',ttl:'悪天時 Plan B（前倒し撤退）',desc:'3日前〜前夜に佐渡汽船「1週間就欠航予報」＋台風進路を確認。8/3が確実に危ういと判明したら→(1)8/2に上越の宿を確保（きっちんやど連泊 or 別宿／無料キャンセル可で）(2)8/2 17:25 小木→直江津で前倒し撤退→上越泊(3)8/3は朝からフリーで長岡へ（上越周辺を半日観光してから花火も可）。佐渡レンタカーは8/2夕方返却に変更（小木港店へ一報）。たらい船・宿根木は割愛。海上欠航でも長岡花火は実施されることがある＝渡れないと詰むので、当日に賭けず前日撤退が堅い。'},
      {t:'07:00',cat:'観光',cls:'see',ttl:'宿根木（朝の散策・7:00〜7:40）',desc:'宿(千種)を6:15頃発→約40分。集落は1haほどでコンパクト、外観・石畳の路地・三角家の外観・海辺を撮影。内部見学は9時〜なので今回は街歩き中心。7:40発→小木港まで約10分で、8:30のたらい船に余裕。',map:mapPin('宿根木','宿根木 佐渡')},
      {t:'08:30',cat:'体験',cls:'see',ttl:'たらい船（力屋観光汽船・小木）',desc:'一番乗りで。',map:mapPin('力屋観光汽船','力屋観光汽船 たらい舟 小木')},
      {t:'〜09:30',cat:'返却',cls:'move',ttl:'佐渡レンタカー 返却（小木港店）',desc:'8:00開店。乗船前に返す。',map:mapPin('小木港店','ニコニコレンタカー佐渡小木港店 佐渡市小木町1935-7'),tel:'0120-322-525'},
      {t:'10:35',cat:'乗船',cls:'ferry',ttl:'小木 → 直江津（こがね丸）',desc:'前夜に運航状況を必ず確認。'},
      {t:'13:15',cat:'到着',cls:'ferry',ttl:'直江津港 着・自分の車を回収'},
      {t:'〜14:00',cat:'宿',cls:'stay',ttl:'きっちんやど本舗（上越）先入り',desc:'チェックイン手続き・荷物投入・鍵受取（花火後の深夜帰着に備える）。事前に深夜帰着を一報。',map:mapPin('きっちんやど本舗','きっちんやど本舗 上越市木田')},
      {t:'買い出し',cat:'準備',cls:'fire',ttl:'観覧用の飲み物・軽食は上越で先に',desc:'長岡市内・会場周辺・周辺スーパーは当日午後〜夕方が激混み＆品薄。上越のスーパー（原信・ウオロク）か北陸道SAで、長岡に入る前に買っておく。飲み物は特に先に。※帰りも運転なのでドライバーはノンアル。'},
      {t:'夕方',cat:'移動',cls:'fire',ttl:'長岡へ（約1時間）'},
      {t:'15〜16時',cat:'食事',cls:'eat',ttl:'青島食堂 宮内駅前店（生姜醤油ラーメン）',desc:'長岡名物の元祖。遅め昼(15時台)なら行列が比較的マシ。11-19時・第3水休(8/3は営業)・駐車場20台・現金のみ。満車なら近隣の生姜醤油店へ。',map:mapPin('青島食堂 宮内駅前店','青島食堂 宮内駅前店 長岡市宮内3-5-3'),tel:'0258-34-1186'},
      {t:'駐車',cat:'駐車',cls:'fire',ttl:'越後丘陵公園（B会場・抽選結果待ち）',desc:'当選なら駐車→無料シャトルでB会場。外れたら代替Pを手配。',map:mapPin('越後丘陵公園','国営越後丘陵公園 長岡')},
      {t:'19:20',cat:'花火',cls:'fire',ttl:'長岡花火 B会場（〜21:10）',desc:'花火後は上越のきっちんやどへ戻って就寝。'},
      {t:'泊',cat:'宿',cls:'stay',ttl:'きっちんやど本舗（上越）'}
     ]},
    {key:'8/4',dow:'火',title:'8/4(火)｜帰宅',sub:'上越 → 自宅（約300km）',
     items:[
      {t:'午前',cat:'出発',cls:'move',ttl:'上越を出発',desc:'上信越道・関越（または中央道）。約4〜4.5時間＋休憩。'},
      {t:'〜17:00',cat:'返却',cls:'move',ttl:'ニコニコレンタカー 新百合ヶ丘店 返却',desc:'9〜10時発なら余裕。給油満タンで。',map:mapPin('新百合ヶ丘店','ニコニコレンタカー新百合ヶ丘店 川崎市麻生区古沢30-3'),tel:'044-299-7231'}
     ]}
  ];

  // ---- reference ----
  var ref = [
    {ttl:'フェリー（直江津航路・こがね丸）',rows:[
      '行き：<b>7/31 直江津14:00 → 小木16:40</b>',
      '帰り：<b>8/3 小木10:35 → 直江津13:15</b>',
      '所要2時間40分／1日2便のみ',
    ],map:mapPin('佐渡汽船 直江津港','直江津港 佐渡汽船ターミナル 上越市'),tel:'0570-200310'},
    {ttl:'⚠ 悪天時 Plan B（前倒し撤退）',rows:[
      '3日前〜前夜に就欠航予報＋台風を確認',
      '危うければ<b>8/2に上越の宿を確保→8/2 17:25便で直江津へ前倒し</b>',
      '8/3は朝からフリーで長岡へ（連泊なら鍵保持で楽）',
      '※海上欠航でも花火は実施され得る＝当日に賭けない'
    ]},
    {ttl:'長岡花火',rows:['<b>8/3(月) 19:20〜21:10</b>・B会場','駐車：越後丘陵公園（抽選・1,800台・無料シャトル）','一次抽選 申込済 → 結果7/1発表']},
    {ttl:'レンタカー①（本土）',rows:['ニコニコ新百合ヶ丘店','<b>7/31 07:00 受取 〜 8/4 17:00 返却</b>'],tel:'044-299-7231'},
    {ttl:'レンタカー②（佐渡）',rows:['ニコニコ佐渡小木港店','<b>7/31 17:00 〜 8/3 09:30</b>'],tel:'0120-322-525'},
    {ttl:'宿',rows:['7/31〜8/2：ホテルネストタイム（千種）','8/3：きっちんやど本舗（上越）']}
  ];

  // ---- checklists ----
  var lists = [
    {id:'pack',title:'持ち物（4泊5日・夏）',items:[
      '免許証・身分証・現金・クレカ','スマホ・充電器・モバイルバッテリー',
      'フェリー予約番号','花火 観覧チケット・駐車券（当選後）',
      '着替え4泊分・下着・靴下','洗面用具・常備薬','日焼け止め・虫除け',
      '雨具（折りたたみ傘/カッパ）','サングラス・帽子','エコバッグ・ビニール袋','カメラ（任意）'
    ]},
    {id:'hike',title:'金北山 ドンデンピストン 登山装備',items:[
      '登山靴・ザック(20〜30L)','レインウェア上下（必須）','行動食・昼食・水1.5〜2L',
      'ヘッドライト（早朝発）','地図/GPS（スマホ）・モバイルバッテリー','登山届（提出済み確認）',
      '防寒着・帽子・手袋','ファーストエイド・テーピング','タオル・下山後の着替え',
      'トレッキングポール（任意）','熊鈴・虫除け（任意）','温泉セット（喜らく用）'
    ]},
    {id:'todo',title:'要確認・予約',items:[
      'Googleマップで「佐渡島」＋「上越〜長岡」のオフラインマップをDL（圏外でも経路ナビが動く）',
      '越後丘陵公園 抽選結果（7/1）＋外れ時の代替P','登山届を佐渡トレッキング協議会へ提出',
      'きっちんやど 8/3 予約＋深夜帰着の一報','新百合ヶ丘レンタカー予約（7/1以降）',
      '直江津港 駐車場（先着）or akippa予約','佐渡レンタカー 小木港店 予約',
      'ネストタイム3連泊 予約（済）'
    ]}
  ];

  // ---- render ----
  function itemHTML(it){
    var cls='item '+(it.cls||'move');
    var pin = it.map ? '<a class="pin" target="_blank" rel="noopener" href="'+url(it.map.q)+'">🧭 '+it.map.pin+'</a>' : '';
    var tel = it.tel ? '<a class="tel" href="tel:'+it.tel.replace(/[^0-9]/g,'')+'">☎ '+it.tel+'</a>' : '';
    var row = (pin||tel) ? '<div class="row">'+pin+tel+'</div>' : '';
    var desc = it.desc ? '<p class="desc'+(it.cat==='要注意'?' warn':'')+'">'+it.desc+'</p>' : '';
    return '<div class="'+cls+'"><div class="cat">'+(it.cat||'')+'</div>'+
      '<div class="top"><div class="time">'+it.t+'</div><div class="ttl">'+it.ttl+'</div></div>'+
      desc+row+'</div>';
  }
  function blockHTML(b){
    var h='<div class="plan-label"><span class="pill '+b.pill+'">'+b.label+'</span></div>';
    h+=b.items.map(itemHTML).join('');
    return h;
  }

  var tabs=document.getElementById('tabs'), main=document.getElementById('main');
  days.forEach(function(d,i){
    var btn=document.createElement('button');
    btn.className='tab'+(i===0?' active':'');
    btn.innerHTML=d.key+'<small>'+d.dow+'</small>';
    btn.onclick=function(){
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
      document.querySelectorAll('.day').forEach(function(s){s.classList.remove('active');});
      btn.classList.add('active');
      document.getElementById('day'+i).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
    };
    tabs.appendChild(btn);

    var sec=document.createElement('section');
    sec.className='day'+(i===0?' active':'');
    sec.id='day'+i;
    var html='<div class="dayhead"><h2>'+d.title+'</h2><p>'+d.sub+'</p></div>';
    if(d.block==='hike'){
      html+='<div class="note-flex">基本は<b>この登山プラン</b>でOK。8/1・8/2は<b>晴れる方に登山</b>を入れ替え可（その場合は8/2の観光プランと入れ替え）。</div>';
      html+=blockHTML(hikeBlock);
    } else if(d.block==='see'){
      html+='<div class="note-flex">基本は<b>この観光プラン</b>でOK。天気次第で8/1の登山プランと入れ替え可。</div>';
      html+=blockHTML(seeBlock);
    } else {
      html+=d.items.map(itemHTML).join('');
    }
    // reference + checklists only on last tab
    if(i===days.length-1){
      html+='<div class="ref"><h3>まとめ・連絡先</h3>'+ref.map(function(r){
        var pin=r.map?'<a class="pin" target="_blank" rel="noopener" href="'+url(r.map.q)+'">🧭 '+r.map.pin+'</a>':'';
        var tel=r.tel?'<a class="tel" href="tel:'+r.tel.replace(/[^0-9]/g,'')+'">☎ '+r.tel+'</a>':'';
        var rowsHtml=r.rows.map(function(x){return '<div class="kv">'+x+'</div>';}).join('');
        var foot=(pin||tel)?'<div class="row">'+pin+tel+'</div>':'';
        return '<div class="item"><div class="ttl">'+r.ttl+'</div>'+rowsHtml+foot+'</div>';
      }).join('')+'</div>';
      html+='<div class="lists"><h3>チェックリスト</h3><div id="lists"></div></div>';
    }
    sec.innerHTML=html;
    main.appendChild(sec);
  });

  // ---- checklists with localStorage ----
  var KEY='sado_trip_checks_v1';
  function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch(e){return {};}}
  function save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
  var state=load();
  var host=document.getElementById('lists');
  if(host){
    lists.forEach(function(L){
      var box=document.createElement('div');box.className='check';
      var total=L.items.length, done=L.items.filter(function(_,j){return state[L.id+'_'+j];}).length;
      box.innerHTML='<h4>'+L.title+'<span class="cnt" id="cnt_'+L.id+'">'+done+' / '+total+'</span></h4>';
      var ul=document.createElement('ul');
      L.items.forEach(function(label,j){
        var id=L.id+'_'+j;
        var li=document.createElement('li');
        var checked=state[id]?'checked':'';
        li.innerHTML='<label><input type="checkbox" '+checked+' data-id="'+id+'"><span>'+label+'</span></label>';
        ul.appendChild(li);
      });
      box.appendChild(ul);
      host.appendChild(box);
      var rb=document.createElement('button');rb.className='reset';rb.textContent='「'+L.title+'」のチェックを全部外す';
      rb.onclick=function(){
        L.items.forEach(function(_,j){delete state[L.id+'_'+j];});
        save(state);
        box.querySelectorAll('input').forEach(function(c){c.checked=false;c.parentElement.querySelector('span').style.color='';});
        updateCnt(L);
      };
      host.appendChild(rb);
    });
    host.addEventListener('change',function(e){
      var c=e.target; if(c.type!=='checkbox')return;
      state[c.getAttribute('data-id')]=c.checked; save(state);
      var lid=c.getAttribute('data-id').split('_')[0];
      var L=lists.filter(function(x){return x.id===lid;})[0]; updateCnt(L);
    });
  }
  function updateCnt(L){
    var total=L.items.length, done=L.items.filter(function(_,j){return state[L.id+'_'+j];}).length;
    var el=document.getElementById('cnt_'+L.id); if(el)el.textContent=done+' / '+total;
  }
})();
</script>
